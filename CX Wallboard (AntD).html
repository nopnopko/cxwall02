<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>1330 Dashboard — Contact Center (React + Ant Design)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&family=Noto+Sans:wght@400;500;600;700;800&family=Noto+Sans+Lao:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="stage" id="stage">
  <div class="board" id="board" data-theme="light"></div>
</div>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<!-- dayjs (required by AntD date/time pickers) -->
<script src="https://unpkg.com/dayjs@1.11.13/dayjs.min.js"></script>

<!-- Ant Design 5 (UMD, CSS-in-JS — no separate stylesheet) + icons -->
<script src="https://unpkg.com/antd@5.22.7/dist/antd.min.js"></script>
<script src="https://unpkg.com/@ant-design/icons@5.5.2/dist/index.umd.min.js"></script>

<!-- Babel for in-browser JSX -->
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- logo drop slot (web component) -->
<script src="image-slot.js"></script>

<!-- data + i18n -->
<script src="i18n.js"></script>
<script src="data.js"></script>

<!-- app (JSX) -->
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="panels.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
